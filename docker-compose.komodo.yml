# Honcho stack for Komodo.
#
# Configure runtime settings in the Komodo Stack Environment. Komodo writes
# those values to .env and this compose file passes them into the app services.

x-honcho-build: &honcho-build
  context: .
  dockerfile: Dockerfile

x-honcho-env: &honcho-env
  DB_CONNECTION_URI: postgresql+psycopg://postgres:postgres@database:5432/postgres
  CACHE_ENABLED: "true"
  CACHE_URL: redis://valkey:6379/0?suppress=true

x-honcho-env-file: &honcho-env-file
  - path: .env
    required: false

services:
  api:
    build: *honcho-build
    entrypoint:
      - sh
      - -c
      - |
        echo "Running database migrations..."
        /app/.venv/bin/python scripts/provision_db.py
        echo "Configuring embedding schema..."
        /app/.venv/bin/python scripts/configure_embeddings.py --yes
        echo "Starting API server..."
        exec /app/.venv/bin/fastapi run --host 0.0.0.0 src/main.py
    depends_on:
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy
    ports:
      - "${HONCHO_API_HOST:-127.0.0.1}:${HONCHO_API_HOST_PORT:-8000}:8000"
    environment: *honcho-env
    env_file: *honcho-env-file
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  deriver:
    build: *honcho-build
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment: *honcho-env
    env_file: *honcho-env-file
    restart: unless-stopped

  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    ports:
      - "${HONCHO_DB_HOST:-127.0.0.1}:${HONCHO_DB_HOST_PORT:-15432}:5432"
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    ports:
      - "${HONCHO_VALKEY_HOST:-127.0.0.1}:${HONCHO_VALKEY_HOST_PORT:-16379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  valkey-data:
